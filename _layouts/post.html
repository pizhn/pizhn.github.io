---
layout: default
---

<article class="home-section post-detail">
  <p class="section-title post-date">{{ page.date | date: "%-d %B %Y" }}</p>
  <h1 class="post-title">{{ page.title }}</h1>
  <p class="post-author">by {{ page.author | default: site.author }}</p>

  <div class="post-body">
    {{content}}
  </div>

  {% if page.tags and page.tags.size > 0 %}
    <p class="post-tags"><small>tags: <em>{{ page.tags | join: "</em> - <em>" }}</em></small></p>
  {% endif %}
</article>
